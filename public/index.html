<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NovChat — Real-Time Rooms</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --accent3: #6dfacc;
    --text: #f0f0ff;
    --muted: #666688;
    --bubble-me: linear-gradient(135deg, #7c6dfa, #a06dfa);
    --bubble-them: #1e1e2e;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    position: relative;
  }

  /* Animated BG */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift { from { background-position: 0 0; } to { background-position: 40px 40px; } }

  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; z-index: 0;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: #7c6dfa; top: -100px; right: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: #fa6d9a; bottom: -50px; left: -50px; animation-delay: -4s; }
  .orb3 { width: 200px; height: 200px; background: #6dfacc; top: 50%; left: 40%; animation-delay: -2s; }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* ---- LOBBY ---- */
  #lobby {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #lobby.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }

  .lobby-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 44px;
    width: 420px;
    max-width: 95vw;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 80px rgba(124,109,250,0.1), 0 32px 64px rgba(0,0,0,0.4);
    animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    letter-spacing: -1px;
  }
  .logo-sub {
    color: var(--muted);
    font-size: 0.78rem;
    margin-bottom: 36px;
    letter-spacing: 0.05em;
  }

  label {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,109,250,0.15);
  }
  input[type="text"]::placeholder { color: var(--muted); }

  .room-presets {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .preset-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,109,250,0.08);
  }

  .join-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #a06dfa);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 16px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 4px 24px rgba(124,109,250,0.3);
    margin-top: 4px;
  }
  .join-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,109,250,0.45); }
  .join-btn:active { transform: translateY(0); }

  /* ---- CHAT ---- */
  #chat-app {
    position: fixed; inset: 0; z-index: 9;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #chat-app.visible { opacity: 1; pointer-events: all; }

  .chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    position: relative; z-index: 2;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .header-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .room-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(124,109,250,0.12);
    border: 1px solid rgba(124,109,250,0.25);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.78rem;
    color: var(--accent);
  }
  .room-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .online-count {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; color: var(--muted);
  }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: #6dfacc; }

  .leave-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .leave-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative; z-index: 1;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* System messages */
  .sys-msg {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 8px 0;
    opacity: 0;
    animation: fadeIn 0.4s ease forwards;
  }
  .sys-msg span {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    display: inline-block;
  }

  /* Chat bubbles */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    opacity: 0;
    animation: bubbleIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    margin-bottom: 2px;
  }
  .msg-row.me { flex-direction: row-reverse; }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(12px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
  }

  .bubble-wrap { display: flex; flex-direction: column; max-width: min(70%, 460px); }
  .msg-row.me .bubble-wrap { align-items: flex-end; }

  .bubble-name {
    font-size: 0.65rem;
    color: var(--muted);
    margin-bottom: 4px;
    padding: 0 4px;
    letter-spacing: 0.04em;
  }

  .bubble {
    padding: 10px 16px;
    border-radius: 18px;
    font-size: 0.88rem;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }
  .msg-row:not(.me) .bubble {
    background: var(--bubble-them);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .msg-row.me .bubble {
    background: var(--bubble-me);
    border-bottom-right-radius: 4px;
    color: #fff;
    box-shadow: 0 4px 16px rgba(124,109,250,0.3);
  }

  .bubble-time {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  /* Typing indicator */
  #typing-area {
    min-height: 28px;
    padding: 0 20px;
    display: flex; align-items: center;
    font-size: 0.73rem;
    color: var(--muted);
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .typing-dots {
    display: inline-flex; gap: 3px; margin-left: 6px; align-items: center;
  }
  .typing-dots span {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent);
    animation: dotBounce 1.2s ease infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%,80%,100%{transform:scale(0.6);opacity:0.4}
    40%{transform:scale(1);opacity:1}
  }

  /* Input area */
  .input-area {
    padding: 14px 20px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
    position: relative; z-index: 2;
  }

  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-row:focus-within {
    border-color: rgba(124,109,250,0.5);
    box-shadow: 0 0 0 3px rgba(124,109,250,0.08);
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.5;
    padding: 2px 0;
  }
  #msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #a06dfa);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(124,109,250,0.3);
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 20px rgba(124,109,250,0.5); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 18px; height: 18px; }

  /* Users sidebar on wide screens */
  @media (min-width: 768px) {
    #chat-app { flex-direction: column; }
    .chat-body { display: flex; flex: 1; overflow: hidden; }
    #messages { flex: 1; }
    .sidebar {
      width: 200px;
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .user-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0;
      font-size: 0.78rem;
      color: var(--text);
    }
    .user-avatar-sm {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      flex-shrink: 0;
    }
  }
  @media (max-width: 767px) {
    .sidebar { display: none; }
    .chat-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.8rem;
    color: var(--text);
    z-index: 999;
    opacity: 0;
    animation: toastIn 0.3s ease forwards;
  }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

  /* Emoji button */
  .emoji-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px;
    transition: transform 0.15s;
    flex-shrink: 0;
    line-height: 1;
    align-self: center;
  }
  .emoji-btn:hover { transform: scale(1.2); }

  .emoji-panel {
    position: absolute;
    bottom: 80px; right: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px;
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    z-index: 100;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    display: none;
  }
  .emoji-panel.open { display: grid; animation: cardIn 0.2s ease; }
  .emoji-panel button {
    background: transparent; border: none;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: background 0.1s, transform 0.1s;
  }
  .emoji-panel button:hover { background: var(--surface); transform: scale(1.2); }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-card">
    <div class="logo">NovChat</div>
    <div class="logo-sub">// real-time rooms · no login needed</div>

    <label>your name</label>
    <input type="text" id="username-input" placeholder="e.g. cosmic_wave" maxlength="20" autocomplete="off"/>

    <label>room name</label>
    <input type="text" id="room-input" placeholder="e.g. late-night-vibes" maxlength="30" autocomplete="off"/>

    <div class="room-presets">
      <button class="preset-btn" onclick="setRoom('general')">general</button>
      <button class="preset-btn" onclick="setRoom('random')">random</button>
      <button class="preset-btn" onclick="setRoom('dev-talk')">dev-talk</button>
      <button class="preset-btn" onclick="setRoom('music')">music</button>
      <button class="preset-btn" onclick="setRoom('gaming')">gaming</button>
    </div>

    <button class="join-btn" onclick="joinRoom()">Join Room →</button>
  </div>
</div>

<!-- CHAT APP -->
<div id="chat-app">
  <div class="chat-header">
    <div class="header-left">
      <div class="header-logo">NovChat</div>
      <div class="room-badge">
        <div class="room-dot"></div>
        <span id="header-room">room</span>
      </div>
    </div>
    <div class="header-right">
      <div class="online-count">
        <div class="online-dot"></div>
        <span id="online-count">1 online</span>
      </div>
      <button class="leave-btn" onclick="leaveRoom()">leave</button>
    </div>
  </div>

  <div class="chat-body">
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative">
      <div id="messages"></div>
      <div id="typing-area"></div>
      <div class="input-area">
        <div class="emoji-panel" id="emoji-panel">
          <!-- emojis inserted by JS -->
        </div>
        <div class="input-row">
          <button class="emoji-btn" onclick="toggleEmoji()" title="Emoji">😊</button>
          <textarea id="msg-input" placeholder="send a message..." rows="1" maxlength="500"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-title">in this room</div>
      <div id="users-list"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myRoom = '';
let myUsername = '';
let mySocketId = '';
let typingTimer = null;
let isTyping = false;
const typingUsers = new Set();

const EMOJIS = ['😊','😂','🔥','❤️','👍','😭','🤔','😎','🥳','💀','✨','🙌','😍','🤣','😅','👀','💯','🎉','🚀','⚡','🌙','🌊','🍕','🎵','😴','🤯','👾','🫡','💜','🫶'];
const COLORS = ['#7c6dfa','#fa6d9a','#6dfacc','#fad96d','#fa976d','#6daaff','#d96dfa'];

function getColor(name) {
  let h = 0; for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}

function getInitial(name) { return name[0].toUpperCase(); }

function setRoom(name) {
  document.getElementById('room-input').value = name;
}

function joinRoom() {
  const username = document.getElementById('username-input').value.trim();
  const room = document.getElementById('room-input').value.trim().toLowerCase().replace(/\s+/g,'-');
  if (!username) return shake('username-input');
  if (!room) return shake('room-input');
  myUsername = username;
  myRoom = room;
  socket.emit('join_room', { room, username });
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake 0.4s ease';
  el.style.borderColor = 'var(--accent2)';
  setTimeout(() => { el.style.borderColor = ''; el.style.animation = ''; }, 600);
}

// Inject shake keyframe
const style = document.createElement('style');
style.textContent = `@keyframes shake {0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}100%{transform:translateX(0)}}`;
document.head.appendChild(style);

socket.on('joined', ({ room, users }) => {
  mySocketId = socket.id;
  document.getElementById('header-room').textContent = '#' + room;
  document.getElementById('lobby').classList.add('hidden');
  const app = document.getElementById('chat-app');
  app.classList.add('visible');
  addSysMsg('you joined #' + room);

  // init emoji panel
  const panel = document.getElementById('emoji-panel');
  panel.innerHTML = EMOJIS.map(e => `<button onclick="insertEmoji('${e}')">${e}</button>`).join('');
});

socket.on('room_users', (users) => {
  document.getElementById('online-count').textContent = users.length + (users.length === 1 ? ' online' : ' online');
  const list = document.getElementById('users-list');
  list.innerHTML = users.map(u => `
    <div class="user-item">
      <div class="user-avatar-sm" style="background:${getColor(u.username)}22;color:${getColor(u.username)};border:1px solid ${getColor(u.username)}44">${getInitial(u.username)}</div>
      <span>${u.username}${u.id === socket.id ? ' <span style="color:var(--muted);font-size:0.65rem">(you)</span>' : ''}</span>
    </div>
  `).join('');
});

socket.on('receive_message', ({ id, username, message, time, socketId }) => {
  const isMe = socketId === socket.id;
  addMessage(username, message, time, isMe);
});

socket.on('user_joined', ({ username }) => {
  addSysMsg(`${username} joined the room ✦`);
});
socket.on('user_left', ({ username }) => {
  addSysMsg(`${username} left`);
});

socket.on('user_typing', ({ username }) => {
  typingUsers.add(username);
  updateTyping();
});
socket.on('user_stop_typing', ({ username }) => {
  typingUsers.delete(username);
  updateTyping();
});

function updateTyping() {
  const area = document.getElementById('typing-area');
  if (typingUsers.size === 0) { area.innerHTML = ''; return; }
  const names = [...typingUsers].join(', ');
  area.innerHTML = `<span>${names} ${typingUsers.size === 1 ? 'is' : 'are'} typing</span><span class="typing-dots"><span></span><span></span><span></span></span>`;
}

function addMessage(username, message, time, isMe) {
  const msgs = document.getElementById('messages');
  const color = getColor(username);
  const t = new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = 'msg-row' + (isMe ? ' me' : '');
  div.innerHTML = `
    <div class="avatar" style="background:${color}22;color:${color};border:1px solid ${color}44">${getInitial(username)}</div>
    <div class="bubble-wrap">
      ${!isMe ? `<div class="bubble-name">${username}</div>` : ''}
      <div class="bubble">${escapeHtml(message)}</div>
      <div class="bubble-time">${t}</div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSysMsg(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.innerHTML = `<span>${text}</span>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg || !myRoom) return;
  socket.emit('send_message', { message: msg, room: myRoom });
  input.value = '';
  input.style.height = 'auto';
  emitStopTyping();
  closeEmoji();
}

// Input handlers
const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  if (!isTyping && myRoom) {
    isTyping = true;
    socket.emit('typing', { room: myRoom });
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(emitStopTyping, 1500);
});

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function emitStopTyping() {
  if (isTyping) {
    isTyping = false;
    socket.emit('stop_typing', { room: myRoom });
  }
}

function leaveRoom() {
  location.reload();
}

function toggleEmoji() {
  document.getElementById('emoji-panel').classList.toggle('open');
}
function closeEmoji() {
  document.getElementById('emoji-panel').classList.remove('open');
}
function insertEmoji(e) {
  const input = document.getElementById('msg-input');
  input.value += e;
  input.focus();
  closeEmoji();
}

document.addEventListener('click', (e) => {
  const panel = document.getElementById('emoji-panel');
  if (!panel.contains(e.target) && !e.target.classList.contains('emoji-btn')) {
    closeEmoji();
  }
});
</script>
</body>
</html>
