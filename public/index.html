<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NovChat — Real-Time Rooms</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#2a2a3a;
  --accent:#7c6dfa;--accent2:#fa6d9a;--accent3:#6dfacc;
  --text:#f0f0ff;--muted:#666688;
  --bubble-me:linear-gradient(135deg,#7c6dfa,#a06dfa);--bubble-them:#1e1e2e;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;position:relative}

.bg-grid{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(124,109,250,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,109,250,0.03) 1px,transparent 1px);
  background-size:40px 40px;animation:gridShift 20s linear infinite}
@keyframes gridShift{from{background-position:0 0}to{background-position:40px 40px}}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none;z-index:0;animation:orbFloat 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:#7c6dfa;top:-100px;right:-100px}
.orb2{width:300px;height:300px;background:#fa6d9a;bottom:-50px;left:-50px;animation-delay:-4s}
.orb3{width:200px;height:200px;background:#6dfacc;top:50%;left:40%;animation-delay:-2s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.05)}66%{transform:translate(-20px,20px) scale(.95)}}

/* LOBBY */
#lobby{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease,transform .5s ease}
#lobby.hidden{opacity:0;transform:scale(.95);pointer-events:none}
.lobby-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:420px;max-width:95vw;position:relative;z-index:1;box-shadow:0 0 80px rgba(124,109,250,.1),0 32px 64px rgba(0,0,0,.4);animation:cardIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.logo{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;letter-spacing:-1px}
.logo-sub{color:var(--muted);font-size:.78rem;margin-bottom:36px;letter-spacing:.05em}
label{display:block;font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:.95rem;padding:14px 16px;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:20px}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,109,250,.15)}
input[type=text]::placeholder{color:var(--muted)}
.room-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.preset-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.72rem;padding:6px 14px;cursor:pointer;transition:all .2s;letter-spacing:.03em}
.preset-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,109,250,.08)}
.join-btn{width:100%;background:linear-gradient(135deg,var(--accent),#a06dfa);border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;padding:16px;cursor:pointer;letter-spacing:.05em;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 24px rgba(124,109,250,.3);margin-top:4px}
.join-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,109,250,.45)}
.join-btn:active{transform:translateY(0)}

/* CHAT APP */
#chat-app{position:fixed;inset:0;z-index:9;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .4s ease}
#chat-app.visible{opacity:1;pointer-events:all}

/* Drag overlay */
#drag-overlay{position:fixed;inset:0;z-index:999;background:rgba(124,109,250,.12);backdrop-filter:blur(4px);border:3px dashed var(--accent);border-radius:16px;margin:12px;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;pointer-events:none}
#drag-overlay.active{display:flex}
.drag-icon{font-size:4rem;animation:bounce .6s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.drag-text{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:var(--accent)}

.chat-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(10,10,15,.8);backdrop-filter:blur(20px);position:relative;z-index:2;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.room-badge{display:flex;align-items:center;gap:6px;background:rgba(124,109,250,.12);border:1px solid rgba(124,109,250,.25);border-radius:20px;padding:5px 12px;font-size:.78rem;color:var(--accent)}
.room-dot{width:7px;height:7px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.header-right{display:flex;align-items:center;gap:12px}
.online-count{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--muted)}
.online-dot{width:6px;height:6px;border-radius:50%;background:#6dfacc}
.leave-btn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem;padding:6px 12px;cursor:pointer;transition:all .2s}
.leave-btn:hover{border-color:var(--accent2);color:var(--accent2)}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:4px;position:relative;z-index:1;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sys-msg{text-align:center;font-size:.72rem;color:var(--muted);padding:8px 0;opacity:0;animation:fadeIn .4s ease forwards}
.sys-msg span{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 14px;display:inline-block}

.msg-row{display:flex;align-items:flex-end;gap:10px;opacity:0;animation:bubbleIn .35s cubic-bezier(.34,1.56,.64,1) forwards;margin-bottom:2px;position:relative}
.msg-row.me{flex-direction:row-reverse}
@keyframes bubbleIn{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;flex-shrink:0;font-family:'Syne',sans-serif}
.bubble-wrap{display:flex;flex-direction:column;max-width:min(72%,480px)}
.msg-row.me .bubble-wrap{align-items:flex-end}
.bubble-name{font-size:.65rem;color:var(--muted);margin-bottom:4px;padding:0 4px;letter-spacing:.04em}
.bubble{padding:10px 16px;border-radius:18px;font-size:.88rem;line-height:1.5;word-break:break-word;position:relative}
.msg-row:not(.me) .bubble{background:var(--bubble-them);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.msg-row.me .bubble{background:var(--bubble-me);border-bottom-right-radius:4px;color:#fff;box-shadow:0 4px 16px rgba(124,109,250,.3)}
.bubble-time{font-size:.62rem;color:var(--muted);margin-top:4px;padding:0 4px}

/* Image bubble */
.img-bubble{padding:6px!important;cursor:pointer;position:relative;overflow:hidden}
.img-bubble img{max-width:280px;max-height:280px;width:100%;border-radius:12px;display:block;object-fit:cover;transition:transform .2s,filter .2s}
.img-bubble:hover img{transform:scale(1.02);filter:brightness(1.06)}
.img-overlay{position:absolute;inset:6px;border-radius:12px;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .2s}
.img-bubble:hover .img-overlay{background:rgba(0,0,0,.3);opacity:1}
.img-overlay svg{width:32px;height:32px;color:#fff}

/* Reactions */
.reactions-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;padding:0 4px}
.reaction-pill{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:.8rem;cursor:pointer;transition:all .15s;user-select:none;font-family:'DM Mono',monospace}
.reaction-pill:hover,.reaction-pill.mine{background:rgba(124,109,250,.15);border-color:rgba(124,109,250,.4)}
.reaction-pill .r-count{font-size:.65rem;color:var(--muted)}
.reaction-pill.mine .r-count{color:var(--accent)}

/* Quick react on hover */
.msg-row:hover .react-trigger{opacity:1;transform:translateY(0)}
.react-trigger{opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s;position:absolute;top:-38px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:5px 10px;display:flex;gap:4px;z-index:10;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.msg-row:not(.me) .react-trigger{left:44px}
.msg-row.me .react-trigger{right:44px}
.react-trigger button{background:none;border:none;font-size:1.05rem;cursor:pointer;padding:2px 3px;border-radius:6px;transition:transform .1s;line-height:1}
.react-trigger button:hover{transform:scale(1.35)}

/* Typing */
#typing-area{min-height:28px;padding:0 20px;display:flex;align-items:center;font-size:.73rem;color:var(--muted);flex-shrink:0}
.typing-dots{display:inline-flex;gap:3px;margin-left:6px;align-items:center}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:dotBounce 1.2s ease infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* INPUT AREA */
.input-area{padding:12px 20px 20px;border-top:1px solid var(--border);background:rgba(10,10,15,.85);backdrop-filter:blur(20px);flex-shrink:0;position:relative;z-index:2}
#img-preview-strip{display:none;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
#img-preview-strip.has-images{display:flex}
.preview-thumb{position:relative;width:64px;height:64px;animation:bubbleIn .25s ease}
.preview-thumb img{width:64px;height:64px;border-radius:10px;object-fit:cover;border:2px solid var(--accent)}
.preview-remove{position:absolute;top:-7px;right:-7px;width:20px;height:20px;background:var(--accent2);border:none;border-radius:50%;color:#fff;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.preview-remove:hover{transform:scale(1.1)}

.input-row{display:flex;gap:10px;align-items:flex-end;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 10px 10px 14px;transition:border-color .2s,box-shadow .2s}
.input-row:focus-within{border-color:rgba(124,109,250,.5);box-shadow:0 0 0 3px rgba(124,109,250,.08)}
#msg-input{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.9rem;outline:none;resize:none;max-height:120px;min-height:24px;line-height:1.5;padding:2px 0}
#msg-input::placeholder{color:var(--muted)}

.icon-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:5px;transition:transform .15s,color .15s;flex-shrink:0;line-height:1;align-self:center;display:flex;align-items:center;justify-content:center;border-radius:8px}
.icon-btn:hover{transform:scale(1.15);color:var(--accent);background:rgba(124,109,250,.1)}
.icon-btn svg{width:18px;height:18px}

.send-btn{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),#a06dfa);border:none;border-radius:10px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 12px rgba(124,109,250,.3)}
.send-btn:hover{transform:scale(1.08);box-shadow:0 4px 20px rgba(124,109,250,.5)}
.send-btn:active{transform:scale(.95)}
.send-btn svg{width:18px;height:18px}

.emoji-panel{position:absolute;bottom:88px;left:20px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px;display:none;grid-template-columns:repeat(7,1fr);gap:6px;z-index:100;box-shadow:0 16px 48px rgba(0,0,0,.4)}
.emoji-panel.open{display:grid;animation:cardIn .2s ease}
.emoji-panel button{background:transparent;border:none;font-size:1.3rem;cursor:pointer;padding:4px;border-radius:6px;transition:background .1s,transform .1s}
.emoji-panel button:hover{background:var(--surface);transform:scale(1.2)}

/* Sidebar */
@media(min-width:768px){
  .chat-body{display:flex;flex:1;overflow:hidden}
  #messages{flex:1}
  .sidebar{width:200px;border-left:1px solid var(--border);padding:20px 16px;overflow-y:auto;flex-shrink:0}
  .sidebar-title{font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
  .user-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.78rem;color:var(--text)}
  .user-avatar-sm{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0}
}
@media(max-width:767px){
  .sidebar{display:none}
  .chat-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.open{display:flex;animation:fadeIn .2s ease}
#lightbox img{max-width:92vw;max-height:90vh;border-radius:14px;box-shadow:0 32px 80px rgba(0,0,0,.6);object-fit:contain;animation:zoomIn .25s cubic-bezier(.34,1.56,.64,1);cursor:default}
@keyframes zoomIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
#lightbox-close{position:absolute;top:20px;right:24px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:50%;width:44px;height:44px;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:sans-serif}
#lightbox-close:hover{background:rgba(255,255,255,.25);transform:scale(1.1)}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt=""/>
</div>

<!-- DRAG OVERLAY -->
<div id="drag-overlay">
  <div class="drag-icon">🖼️</div>
  <div class="drag-text">Drop to send image</div>
</div>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-card">
    <div class="logo">NovChat</div>
    <div class="logo-sub">// real-time rooms · no login needed</div>
    <label>your name</label>
    <input type="text" id="username-input" placeholder="e.g. cosmic_wave" maxlength="20" autocomplete="off"/>
    <label>room name</label>
    <input type="text" id="room-input" placeholder="e.g. late-night-vibes" maxlength="30" autocomplete="off"/>
    <div class="room-presets">
      <button class="preset-btn" onclick="setRoom('general')">general</button>
      <button class="preset-btn" onclick="setRoom('random')">random</button>
      <button class="preset-btn" onclick="setRoom('dev-talk')">dev-talk</button>
      <button class="preset-btn" onclick="setRoom('music')">music</button>
      <button class="preset-btn" onclick="setRoom('gaming')">gaming</button>
    </div>
    <button class="join-btn" onclick="joinRoom()">Join Room →</button>
  </div>
</div>

<!-- CHAT APP -->
<div id="chat-app">
  <div class="chat-header">
    <div class="header-left">
      <div class="header-logo">NovChat</div>
      <div class="room-badge"><div class="room-dot"></div><span id="header-room">room</span></div>
    </div>
    <div class="header-right">
      <div class="online-count"><div class="online-dot"></div><span id="online-count">1 online</span></div>
      <button class="leave-btn" onclick="leaveRoom()">leave</button>
    </div>
  </div>

  <div class="chat-body">
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative">
      <div id="messages"></div>
      <div id="typing-area"></div>
      <div class="input-area">
        <div id="img-preview-strip"></div>
        <div class="emoji-panel" id="emoji-panel"></div>
        <div class="input-row">
          <button class="icon-btn" onclick="toggleEmoji()" title="Emoji">😊</button>
          <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Send photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFileSelect(this.files)"/>
          <textarea id="msg-input" placeholder="message · paste image · or drop a file…" rows="1" maxlength="500"></textarea>
          <button class="send-btn" onclick="sendAll()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="sidebar">
      <div class="sidebar-title">in this room</div>
      <div id="users-list"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myRoom='', myUsername='', mySocketId='';
let typingTimer=null, isTyping=false;
const typingUsers = new Set();
const pendingImages = [];
const QUICK_REACTIONS = ['👍','❤️','😂','😮','😢','🔥'];
const EMOJIS = ['😊','😂','🔥','❤️','👍','😭','🤔','😎','🥳','💀','✨','🙌','😍','🤣','😅','👀','💯','🎉','🚀','⚡','🌙','🌊','🍕','🎵','😴','🤯','👾','🫡','💜','🫶'];
const COLORS = ['#7c6dfa','#fa6d9a','#6dfacc','#fad96d','#fa976d','#6daaff','#d96dfa'];

// Inject shake keyframe
const ks = document.createElement('style');
ks.textContent = `@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}100%{transform:translateX(0)}}`;
document.head.appendChild(ks);

function getColor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h]}
function getInitial(n){return(n||'?')[0].toUpperCase()}
function setRoom(n){document.getElementById('room-input').value=n}

function joinRoom(){
  const u=document.getElementById('username-input').value.trim();
  const r=document.getElementById('room-input').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!u)return shake('username-input');
  if(!r)return shake('room-input');
  myUsername=u; myRoom=r;
  socket.emit('join_room',{room:r,username:u});
}
function shake(id){
  const el=document.getElementById(id);
  el.style.animation='none'; el.offsetHeight;
  el.style.animation='shake .4s ease';
  el.style.borderColor='var(--accent2)';
  setTimeout(()=>{el.style.borderColor='';el.style.animation=''},700);
}

// ── SOCKET EVENTS ──
socket.on('joined',({room})=>{
  mySocketId=socket.id;
  document.getElementById('header-room').textContent='#'+room;
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('chat-app').classList.add('visible');
  addSysMsg('you joined #'+room);
  const panel=document.getElementById('emoji-panel');
  panel.innerHTML=EMOJIS.map(e=>`<button onclick="insertEmoji('${e}')">${e}</button>`).join('');
});

socket.on('room_users',(users)=>{
  document.getElementById('online-count').textContent=users.length+' online';
  document.getElementById('users-list').innerHTML=users.map(u=>`
    <div class="user-item">
      <div class="user-avatar-sm" style="background:${getColor(u.username)}22;color:${getColor(u.username)};border:1px solid ${getColor(u.username)}44">${getInitial(u.username)}</div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.username}${u.id===socket.id?' <span style="color:var(--muted);font-size:.6rem">(you)</span>':''}</span>
    </div>`).join('');
});

socket.on('receive_message',(data)=>{
  const isMe = data.socketId===socket.id;
  if(data.type==='image') addImageMessage(data.id,data.username,data.imageData,data.imageName,data.time,isMe);
  else addMessage(data.id,data.username,data.message,data.time,isMe);
});

socket.on('user_joined',({username})=>addSysMsg(`${username} joined ✦`));
socket.on('user_left',({username})=>addSysMsg(`${username} left`));
socket.on('user_typing',({username})=>{typingUsers.add(username);updateTyping()});
socket.on('user_stop_typing',({username})=>{typingUsers.delete(username);updateTyping()});

socket.on('update_reactions',({msgId,reactions})=>{
  const row=document.querySelector(`[data-msg-id="${msgId}"]`);
  if(!row) return;
  let rr=row.querySelector('.reactions-row');
  if(!rr){rr=document.createElement('div');rr.className='reactions-row';row.querySelector('.bubble-wrap').appendChild(rr)}
  rr.innerHTML='';
  for(const [emoji,users] of Object.entries(reactions)){
    if(!users.length) continue;
    const mine=users.includes(myUsername);
    const pill=document.createElement('button');
    pill.className='reaction-pill'+(mine?' mine':'');
    pill.innerHTML=`${emoji}<span class="r-count">${users.length}</span>`;
    pill.title=users.join(', ');
    pill.onclick=()=>socket.emit('react_message',{room:myRoom,msgId,emoji});
    rr.appendChild(pill);
  }
});

function updateTyping(){
  const area=document.getElementById('typing-area');
  if(!typingUsers.size){area.innerHTML='';return}
  area.innerHTML=`<span>${[...typingUsers].join(', ')} ${typingUsers.size===1?'is':'are'} typing</span><span class="typing-dots"><span></span><span></span><span></span></span>`;
}

// ── BUILD MESSAGES ──
function makeReactTrigger(msgId){
  const div=document.createElement('div');
  div.className='react-trigger';
  div.innerHTML=QUICK_REACTIONS.map(e=>`<button onclick="event.stopPropagation();socket.emit('react_message',{room:myRoom,msgId:'${msgId}',emoji:'${e}'})">${e}</button>`).join('');
  return div;
}

function addMessage(id,username,message,time,isMe){
  const msgs=document.getElementById('messages');
  const color=getColor(username);
  const t=new Date(time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');
  div.className='msg-row'+(isMe?' me':'');
  div.dataset.msgId=id;
  div.innerHTML=`
    <div class="avatar" style="background:${color}22;color:${color};border:1px solid ${color}44">${getInitial(username)}</div>
    <div class="bubble-wrap">
      ${!isMe?`<div class="bubble-name">${escapeHtml(username)}</div>`:''}
      <div class="bubble">${escapeHtml(message)}</div>
      <div class="bubble-time">${t}</div>
    </div>`;
  div.insertBefore(makeReactTrigger(id),div.firstChild);
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function addImageMessage(id,username,imageData,imageName,time,isMe){
  const msgs=document.getElementById('messages');
  const color=getColor(username);
  const t=new Date(time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');
  div.className='msg-row'+(isMe?' me':'');
  div.dataset.msgId=id;
  const imgEl=document.createElement('img');
  imgEl.src=imageData; imgEl.alt=imageName||'image'; imgEl.loading='lazy';
  const overlay=document.createElement('div'); overlay.className='img-overlay';
  overlay.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`;
  const imgBubble=document.createElement('div'); imgBubble.className='bubble img-bubble';
  imgBubble.appendChild(imgEl); imgBubble.appendChild(overlay);
  imgBubble.onclick=()=>openLightbox(imageData);
  const bwrap=document.createElement('div'); bwrap.className='bubble-wrap';
  if(!isMe){const bn=document.createElement('div');bn.className='bubble-name';bn.textContent=username;bwrap.appendChild(bn)}
  bwrap.appendChild(imgBubble);
  const bt=document.createElement('div'); bt.className='bubble-time'; bt.textContent=t;
  bwrap.appendChild(bt);
  const av=document.createElement('div');
  av.className='avatar'; av.style.cssText=`background:${color}22;color:${color};border:1px solid ${color}44`;
  av.textContent=getInitial(username);
  div.appendChild(makeReactTrigger(id));
  div.appendChild(av); div.appendChild(bwrap);
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function addSysMsg(text){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div'); div.className='sys-msg';
  div.innerHTML=`<span>${text}</span>`;
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ── SEND ──
function sendAll(){
  if(!myRoom) return;
  if(pendingImages.length){
    pendingImages.forEach(({dataUrl,name})=>{
      socket.emit('send_message',{room:myRoom,type:'image',imageData:dataUrl,imageName:name});
    });
    pendingImages.length=0; renderPreviews();
  }
  const input=document.getElementById('msg-input');
  const msg=input.value.trim();
  if(msg){
    socket.emit('send_message',{message:msg,room:myRoom,type:'text'});
    input.value=''; input.style.height='auto';
    emitStopTyping();
  }
  closeEmoji();
}

// ── IMAGE HANDLING ──
function handleFileSelect(files){
  [...files].forEach(file=>{
    if(!file.type.startsWith('image/')){return}
    if(file.size>8*1024*1024){alert('Max image size is 8MB');return}
    const reader=new FileReader();
    reader.onload=e=>{pendingImages.push({dataUrl:e.target.result,name:file.name});renderPreviews()};
    reader.readAsDataURL(file);
  });
  document.getElementById('file-input').value='';
}
function renderPreviews(){
  const strip=document.getElementById('img-preview-strip');
  if(!pendingImages.length){strip.className='';strip.innerHTML='';return}
  strip.className='has-images';
  strip.innerHTML=pendingImages.map((img,i)=>`
    <div class="preview-thumb">
      <img src="${img.dataUrl}" alt="preview"/>
      <button class="preview-remove" onclick="removePreview(${i})">✕</button>
    </div>`).join('');
}
function removePreview(i){pendingImages.splice(i,1);renderPreviews()}

// Paste
document.addEventListener('paste',(e)=>{
  if(!myRoom) return;
  [...e.clipboardData.items].forEach(item=>{
    if(item.type.startsWith('image/')){handleFileSelect([item.getAsFile()])}
  });
});

// Drag & drop
const chatApp=document.getElementById('chat-app');
let dragCtr=0;
chatApp.addEventListener('dragenter',(e)=>{
  e.preventDefault(); dragCtr++;
  if([...e.dataTransfer.items].some(i=>i.type.startsWith('image/')))
    document.getElementById('drag-overlay').classList.add('active');
});
chatApp.addEventListener('dragleave',()=>{if(--dragCtr<=0){dragCtr=0;document.getElementById('drag-overlay').classList.remove('active')}});
chatApp.addEventListener('dragover',e=>e.preventDefault());
chatApp.addEventListener('drop',(e)=>{
  e.preventDefault(); dragCtr=0;
  document.getElementById('drag-overlay').classList.remove('active');
  if(e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files);
});

// ── LIGHTBOX ──
function openLightbox(src){
  document.getElementById('lightbox-img').src=src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  setTimeout(()=>document.getElementById('lightbox-img').src='',300);
}
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()});

// ── TYPING ──
const msgInput=document.getElementById('msg-input');
msgInput.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
  if(!isTyping&&myRoom){isTyping=true;socket.emit('typing',{room:myRoom})}
  clearTimeout(typingTimer); typingTimer=setTimeout(emitStopTyping,1500);
});
msgInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAll()}});
function emitStopTyping(){if(isTyping){isTyping=false;socket.emit('stop_typing',{room:myRoom})}}

// ── EMOJI ──
function toggleEmoji(){document.getElementById('emoji-panel').classList.toggle('open')}
function closeEmoji(){document.getElementById('emoji-panel').classList.remove('open')}
function insertEmoji(e){const i=document.getElementById('msg-input');i.value+=e;i.focus();closeEmoji()}
document.addEventListener('click',(e)=>{
  const panel=document.getElementById('emoji-panel');
  if(!panel.contains(e.target)&&!e.target.closest('.icon-btn[title="Emoji"]'))closeEmoji();
});

function leaveRoom(){location.reload()}
</script>
</body>
